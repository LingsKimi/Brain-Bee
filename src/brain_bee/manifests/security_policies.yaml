# 🛡️ Brain Bee 安全策略库 (v1.0.0)

# 审批模式: "conservative"（默认）| "yolo"
# conservative: 工作区内放行、工作区外首次审批后缓存
# yolo: BLOCK 级仍拦截，其余自动放行
approval_mode: conservative

# 额外信任路径（conservative 模式下等同 project_root）
# 路径在加载时 resolve 为绝对路径
trusted_paths: []
# 示例:
# trusted_paths:
#   - ~/Documents/shared-libraries
#   - /tmp/brain_bee-workspace

# ==============================================================================
# 🔴 Level 3: 致命拦截 (🚫 BLOCK)
# 判定逻辑：尝试操作根目录或核心系统路径，或具有极端破坏性的指令。
# ==============================================================================
blocked_patterns:
  - "^rm -rf /$"               # Linux 根目录自毁
  - "^rm -rf C:\\$"            # Windows 根目录自毁
  - "System32"                 # Windows 系统关键目录
  - "/etc/shadow"              # 系统哈希凭证
  - "/etc/passwd"              # 用户账号信息
  - "mkfs"                     # 格式化磁盘
  - "dd if=/dev/"              # 直接磁盘写操作
  - "shred"                    # 物理粉碎

forbidden_system_paths:
  - "/"
  - "/bin"
  - "/sbin"
  - "/etc"
  - "/root"
  - "C:\\Windows"
  - "C:\\Program Files"

# ==============================================================================
# 🟡 Level 2: 高危授权 (🚨 CONFIRM)
# 判定逻辑：路径不在项目内，或涉及密钥泄漏/网络外传风险的操作。
# ==============================================================================
sensitive_commands:
  - "rm"                       # 跨目录删除
  - "mv"                       # 跨目录移动
  - "curl"                     # 网络请求
  - "wget"                     # 下载
  - "env"                      # 读取环境变量 (防泄压)
  - "printenv"                 # 读取环境变量
  - "chmod"                    # 修改权限
  - "chown"                    # 修改所有权
  - "ssh"                      # 远程连接
  - "scp"                      # 远程拷贝

sensitive_patterns:
  - "\\.env"                   # 访问环境变量文件
  - "API_KEY"                  # 关键词扫描
  - "TOKEN"                    # 关键词扫描
  - "SECRET"                   # 关键词扫描

# ==============================================================================
# 🟢 Level 1: 安全放行 (ALLOW)
# 判定逻辑：操作路径位于项目根目录内。
# ==============================================================================
whitelist_modes:
  - "project_root_only"        # 只有在项目根目录内的操作才默认放行
